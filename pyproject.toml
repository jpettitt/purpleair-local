# This project is a Home Assistant custom integration, not a
# pip-installable package. The Python code lives under
# `custom_components/purpleair_local/` and is loaded by HA from there
# (via HACS or a manual copy into the user's HA config dir).
#
# pyproject.toml here exists only to configure pytest. Test
# dependencies live in `requirements_test.txt` so they can be
# installed without `pip install -e .`, which on Python 3.14 creates
# a PEP 660 path-hook shim that HA's integration loader cannot scan.

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
